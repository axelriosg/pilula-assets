<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<style>
:root{--accent:#333333}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DejaVu Sans','Segoe UI',sans-serif;color:#2B2B2B;max-width:820px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.bar{height:6px;background:var(--accent);width:100%}
.header{display:flex;justify-content:space-between;align-items:center;padding:22px 40px 8px;gap:20px}
.brand{display:flex;flex-direction:column}
.header img{max-height:74px;max-width:200px;width:auto}
.name{font-weight:bold;font-size:15px;color:#1A1A1A;margin-top:6px}
.contacts{font-size:9px;line-height:1.9;text-align:right;color:#555}
.rule{border:none;border-top:1px solid #E2E2E2;margin:8px 40px 0}
.body{flex:1;padding:18px 40px 30px}
h1{font-size:24px;color:#1A1A1A;margin-bottom:16px;line-height:1.2}
.h{font-weight:bold;font-size:15px;color:var(--accent);margin:20px 0 8px}
.p{font-size:12.5px;line-height:1.6;text-align:justify;margin-bottom:10px}
ul{margin:0 0 10px 0;padding-left:0;list-style:none}
li{font-size:12.5px;line-height:1.6;margin-bottom:6px;padding-left:18px;text-indent:-18px}
li::before{content:"\2022";color:var(--accent);font-weight:bold;margin-right:9px}
.empty{padding:60px 40px;color:#999;font-size:14px}
@media print{body{max-width:none}.bar{-webkit-print-color-adjust:exact;print-color-adjust:exact}}
</style></head>
<body>
<div class="bar"></div>
<div class="header">
<div class="brand"><img id="logo" alt=""><div class="name" id="name"></div></div>
<div class="contacts" id="contacts"></div>
</div>
<hr class="rule">
<div class="body" id="body"></div>
<div class="bar" style="margin-top:auto"></div>
<script>
(function(){
 var raw=(location.hash||location.search).replace(/^[#?]/,'');
 var body=document.getElementById('body');
 if(!raw){body.innerHTML='<div class="empty">Pré-visualização. Este documento recebe o conteúdo pelo link.</div>';return;}
 var d;try{d=JSON.parse(decodeURIComponent(raw));}catch(e){body.innerHTML='<div class="empty">Conteúdo inválido.</div>';return;}
 if(d.color)document.documentElement.style.setProperty('--accent',d.color);
 var lg=document.getElementById('logo'); if(d.logo){lg.src=d.logo;}else{lg.style.display='none';}
 if(d.name)document.getElementById('name').textContent=d.name;
 document.getElementById('contacts').innerHTML=(d.contacts||[]).join('<br>');
 if(d.title){var t=document.createElement('h1');t.textContent=d.title;body.appendChild(t);}
 (d.blocks||[]).forEach(function(bk){
   if(bk.type==='h'){var e=document.createElement('div');e.className='h';e.textContent=bk.text;body.appendChild(e);}
   else if(bk.type==='list'){var ul=document.createElement('ul');(bk.items||[]).forEach(function(it){var li=document.createElement('li');li.innerHTML=it;ul.appendChild(li);});body.appendChild(ul);}
   else{var p=document.createElement('div');p.className='p';p.innerHTML=bk.text;body.appendChild(p);}
 });
 document.title=d.title||'Documento';
})();
</script>
</body></html>
